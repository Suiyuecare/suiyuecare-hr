services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hrone
      POSTGRES_PASSWORD: hrone
      POSTGRES_DB: hrone
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrone -d hrone"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

